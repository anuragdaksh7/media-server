events {}

http {
    client_max_body_size 100G;

    upstream api {
        server host.docker.internal:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_buffering off;

            proxy_request_buffering off;
        }
    }
}