root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main.exe ./cmd/api/main.go"
bin = "./tmp/main.exe"

include_ext = ["go", "tpl", "tmpl", "html"]

exclude_dir = [
  "tmp",
  "vendor",
  "node_modules",
  "storage"
]

delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"