version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: fileserver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fileserver
      POSTGRES_PASSWORD: fileserverpassword
      POSTGRES_DB: fileserver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fileserver-network

  redis:
    image: redis:7
    container_name: fileserver-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fileserver-network

  minio:
    image: minio/minio:latest
    container_name: fileserver-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: strongpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - fileserver-network

  nginx:
    image: nginx:latest
    container_name: fileserver-nginx
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - postgres
      - redis
    networks:
      - fileserver-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  fileserver-network:
    driver: bridge